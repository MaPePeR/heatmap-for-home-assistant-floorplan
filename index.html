<!DOCTYPE html>
<html>
    <body>
        <input type="file" accept=".svg,image/svg+xml" id="fileselect" /><button type="button" id="loadbutton">Load</button>
        <div id="floorplancontainer"></div>
        
        <script type="text/javascript">
            loadbutton.addEventListener("click", function () {
                console.log("Handling file change")
                const selectedFile = fileselect.files[0] || null;
                if (!selectedFile) {
                    console.log("No file selected")
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    floorplancontainer.innerHTML = e.target.result;
                    generateDistances();
                }
                reader.readAsText(selectedFile);
            })
            function generateDistances() {
                const areas = floorplancontainer.querySelectorAll('.ha-fp-hm-area');
                const sensors = floorplancontainer.querySelectorAll('.ha-fp-hm-sensor');
                console.log(areas)
                console.log(sensors)
            }
        </script>
    </body>
</html>
